name: Release

# Manual trigger only — activate when ready to publish 1.0.0
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (build only, no publish)"
        type: boolean
        default: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Publish to crates.io ────────────────────────────────────────────
  publish-crate:
    name: Publish crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Dry run
        if: inputs.dry_run
        run: cargo publish -p zapcode-core --dry-run
      - name: Publish zapcode-core
        if: ${{ !inputs.dry_run }}
        run: cargo publish -p zapcode-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # ── Build & publish npm ─────────────────────────────────────────────
  publish-npm:
    name: Publish npm (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - name: Install napi-rs CLI
        run: npm install -g @napi-rs/cli
      - name: Build
        working-directory: crates/zapcode-js
        run: napi build --release --target ${{ matrix.target }}
      - name: Publish
        if: matrix.os == 'ubuntu-latest' && !inputs.dry_run
        working-directory: crates/zapcode-js
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ── Build & publish PyPI ────────────────────────────────────────────
  publish-pypi:
    name: Publish PyPI (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
          - os: macos-latest
            target: aarch64
          - os: windows-latest
            target: x64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install maturin
        run: pip install maturin
      - name: Build wheel
        working-directory: crates/zapcode-py
        run: maturin build --release
      - name: Publish
        if: matrix.os == 'ubuntu-latest' && !inputs.dry_run
        working-directory: crates/zapcode-py
        run: maturin publish
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}

  # ── GitHub Release ──────────────────────────────────────────────────
  github-release:
    name: GitHub Release
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-latest
    needs: [publish-crate, publish-npm, publish-pypi]
    steps:
      - uses: actions/checkout@v4
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          tag_name: v${{ github.ref_name }}
