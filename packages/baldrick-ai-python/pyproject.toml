[project]
name = "baldrick-ai"
version = "0.1.0"
description = "AI SDK integration for Baldrick — let LLMs write and execute TypeScript safely"
requires-python = ">=3.10"
license = "MIT"
dependencies = [
    "baldrick",
]

[project.optional-dependencies]
anthropic = ["anthropic>=0.39.0"]
openai = ["openai>=1.0.0"]
langchain = ["langchain-core>=0.3.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/baldrick_ai"]
